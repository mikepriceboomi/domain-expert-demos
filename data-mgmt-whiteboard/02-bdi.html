<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BDI · Boomi Data Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Patrick+Hand&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; overflow: hidden;
      background: #0b1520;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.9rem; position: relative;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        linear-gradient(180deg, rgba(200,218,245,0.09) 0%, rgba(200,218,245,0.04) 8%, transparent 28%),
        linear-gradient(0deg, rgba(0,0,0,0.28) 0%, rgba(0,0,0,0.08) 14%, transparent 30%),
        radial-gradient(ellipse 105% 75% at 50% 50%, transparent 38%, rgba(0,0,0,0.62) 100%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent 0%, rgba(160,190,230,0.08) 20%, rgba(160,190,230,0.12) 50%, rgba(160,190,230,0.08) 80%, transparent 100%);
      pointer-events: none; z-index: 0;
    }
    .wb-frame, .wb-nav { position: relative; z-index: 1; }
    .wb-frame {
      background: #1c2f42; border-radius: 6px 6px 5px 5px;
      padding: 9px 9px 20px 9px;
      box-shadow: 0 2px 0 rgba(255,255,255,0.06) inset, 0 0 120px 24px rgba(210,228,255,0.035), 0 40px 100px rgba(0,0,0,0.72), 0 8px 28px rgba(0,0,0,0.46);
      width: 64vw;
    }
    .wb-surface {
      background: #f6f5f1; border-radius: 2px;
      width: 100%; aspect-ratio: 16 / 9;
      position: relative; overflow: hidden;
    }
    .wb-surface::before {
      content: ''; position: absolute; inset: 0;
      background-image: linear-gradient(rgba(0,0,0,0.020) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.020) 1px, transparent 1px);
      background-size: 46px 46px; pointer-events: none;
    }
    .wb-surface::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 95% 92% at 50% 50%, transparent 65%, rgba(0,0,0,0.05) 100%);
      pointer-events: none;
    }
    .wb-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .wb-nav { display: flex; align-items: center; gap: 2.5rem; }
    .wb-nav a { font-family: 'Poppins', sans-serif; font-size: 0.68rem; font-weight: 700; color: rgba(255,255,255,0.22); text-decoration: none; letter-spacing: 0.10em; text-transform: uppercase; transition: color 0.15s; }
    .wb-nav a:hover { color: rgba(255,255,255,0.60); }
    .wb-brand { height: 20px; opacity: 0.55; display: block; }
    @keyframes wb-in { from { opacity:0 } to { opacity:1 } }
    .wb-frame { animation: wb-in 0.4s ease both; }
  </style>
</head>

<script>
const NS = 'http://www.w3.org/2000/svg';

function draw(id, delay, dur) {
  const el = document.getElementById(id);
  if (!el) return;
  let len = 4000;
  try { if (el.getTotalLength) len = el.getTotalLength(); } catch(e) {}
  el.style.strokeDasharray = `${len} ${len}`;
  el.style.strokeDashoffset = String(len);
  setTimeout(() => {
    el.style.transition = `stroke-dashoffset ${dur}s cubic-bezier(0.35, 0, 0.25, 1)`;
    el.style.strokeDashoffset = '0';
  }, delay * 1000);
}

function write(id, delay, dur) {
  const el = document.getElementById(id);
  if (!el) return;
  try {
    const bbox = el.getBBox();
    const pad = 5;
    const clipId = 'wc-' + id;
    const defs = el.closest('svg').querySelector('defs');
    const cp = document.createElementNS(NS, 'clipPath');
    cp.id = clipId;
    const r = document.createElementNS(NS, 'rect');
    r.setAttribute('x', bbox.x - pad);
    r.setAttribute('y', bbox.y - pad);
    r.setAttribute('height', String(bbox.height + pad * 2));
    r.style.width = '0px';
    cp.appendChild(r);
    defs.appendChild(cp);
    el.setAttribute('clip-path', `url(#${clipId})`);
    setTimeout(() => {
      r.style.transition = `width ${dur}s linear`;
      r.style.width = (bbox.width + pad * 2) + 'px';
    }, delay * 1000);
  } catch(e) { fade(id, delay, dur); }
}

function fade(id, delay, dur, targetOpacity = 1) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.opacity = '0';
  setTimeout(() => {
    el.style.transition = `opacity ${dur}s ease`;
    el.style.opacity = String(targetOpacity);
  }, delay * 1000);
}

document.addEventListener('DOMContentLoaded', () => {
  fade('src-arrows',          0.1,  0.5);

  fade('icon-bdi',            0.4,  0.45);
  write('bdi-title',          0.4,  0.45);
  fade('bdi-subtitle',        0.9,  0.30);

  draw('bdi-rect',            1.2,  1.40);
  draw('bdi-divider',         2.65, 0.50);

  // — Ingestion side first
  write('hdr-ingest',         3.2,  0.40);
  draw('hdr-line-L',          3.65, 0.25);
  write('ing-connectors',     3.95, 0.45);
  write('ing-connectors-b',   4.45, 0.35);
  fade('ing-connectors-sub',  4.85, 0.35);

  // — Transform side after ingestion is done
  write('hdr-transform',      5.25, 0.40);
  draw('hdr-line-R',          5.7,  0.25);
  write('trx-clean',          6.0,  0.35);
  write('trx-orchestrate',    6.4,  0.40);

  fade('dest-ghost',          7.1,  1.1);
});
</script>
