    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.9rem; position: relative;
    }
    body::before {
      content: ''; position: fixed; inset: 0;

      pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent 0%, rgba(160,190,230,0.08) 20%, rgba(160,190,230,0.12) 50%, rgba(160,190,230,0.08) 80%, transparent 100%);

    .wb-frame, .wb-nav { position: relative; z-index: 1; }

      width: 64vw;
    }
    .wb-surface {
      background: #f6f5f1; border-radius: 2px;
      width: 100%; aspect-ratio: 16 / 9;
      position: relative; overflow: hidden;
    }
    .wb-surface::before {
      content: ''; position: absolute; inset: 0;
      background-image: linear-gradient(rgba(0,0,0,0.020) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.020) 1px, transparent 1px);
      background-size: 46px 46px; pointer-events: none;
    }
    .wb-surface::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 95% 92% at 50% 50%, transparent 65%, rgba(0,0,0,0.05) 100%);
      pointer-events: none;
    }
    .wb-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .wb-nav { display: flex; align-items: center; gap: 2.5rem; }
    .wb-nav a { font-family: 'Poppins', sans-serif; font-size: 0.68rem; font-weight: 700; color: rgba(255,255,255,0.22); text-decoration: none; letter-spacing: 0.10em; text-transform: uppercase; transition: color 0.15s; }
    .wb-nav a:hover { color: rgba(255,255,255,0.60); }
    .wb-brand { height: 20px; opacity: 0.55; display: block; }
    @keyframes wb-in { from { opacity:0 } to { opacity:1 } }
    .wb-frame { animation: wb-in 0.4s ease both; }

<script>
const NS = 'http://www.w3.org/2000/svg';

function write(id, delay, dur) {
  const el = document.getElementById(id);
  if (!el) return;
  try {
    const bbox = el.getBBox();
    const pad = 5;
    const clipId = 'wc-' + id;
    const defs = el.closest('svg').querySelector('defs');
    const cp = document.createElementNS(NS, 'clipPath');
    cp.id = clipId;
    const r = document.createElementNS(NS, 'rect');
    r.setAttribute('x', bbox.x - pad);
    r.setAttribute('y', bbox.y - pad);
    r.setAttribute('height', String(bbox.height + pad * 2));
    r.setAttribute('width', '0');
    cp.appendChild(r);
    defs.appendChild(cp);
    el.setAttribute('clip-path', `url(#${clipId})`);
    el.style.opacity = '1';
    const target = bbox.width + pad * 2;
    const durMs = dur * 1000;
    setTimeout(() => {
      const t0 = performance.now();
      (function tick(now) {
        const p = Math.min(1, (now - t0) / durMs);
        r.setAttribute('width', String(target * p));
        if (p < 1) requestAnimationFrame(tick);
      })(performance.now());
    }, delay * 1000);
  } catch(e) { fade(id, delay, dur); }
}

function draw(id, delay, dur) {
  const el = document.getElementById(id);
  if (!el) return;
  let len = 4000;
  try { if (el.getTotalLength) len = el.getTotalLength(); } catch(e) {}
  el.style.strokeDasharray = `${len} ${len}`;
  el.style.strokeDashoffset = String(len);
  setTimeout(() => {
    el.style.transition = `stroke-dashoffset ${dur}s cubic-bezier(0.35, 0, 0.25, 1)`;
    el.style.strokeDashoffset = '0';
  }, delay * 1000);
}

function fade(id, delay, dur, targetOpacity = 1) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.opacity = '0';
  setTimeout(() => {
    el.style.transition = `opacity ${dur}s ease`;
    el.style.opacity = String(targetOpacity);
  }, delay * 1000);
}

document.fonts.ready.then(() => {
  fade('icon-dhub',     1.6,  0.40);
  write('dhub-title',   0.4,  0.45);
  draw('dhub-rect',     0.9,  1.10);
  draw('dhub-rule',     2.1,  0.30);
  write('dhub-line1',   2.5,  0.45);
  write('dhub-line2',   3.0,  0.45);
  write('dhub-line3',   3.5,  0.45);
  write('dhub-native',  4.0,  0.55);
  fade('dhub-native2',  4.6,  0.45);
});
</script>
