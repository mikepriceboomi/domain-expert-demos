<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boomi DataHub — Interactive Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:        #02283B;
      --coral:       #FF7C66;
      --teal:        #0EC38B;
      --white:       #FFFFFF;
      --text-muted:  rgba(255,255,255,0.50);
      --panel-border:rgba(255,255,255,0.08);
    }

    html, body {
      height: 100%;
      font-family: 'Poppins', Arial, sans-serif;
      background: var(--navy);
      color: var(--white);
      overflow: hidden;
    }

    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2.5rem;
      border-bottom: 1px solid var(--panel-border);
      background: rgba(2,28,48,0.90);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      flex-shrink: 0;
      z-index: 10;
    }

    .header-left { display: flex; align-items: center; gap: 1rem; }

    .boomi-wordmark {
      font-size: 1.3rem; font-weight: 800;
      letter-spacing: -0.02em; color: var(--white);
    }
    .boomi-wordmark .dot { color: var(--coral); }

    .header-divider { width:1px; height:22px; background:rgba(255,255,255,0.18); }

    .header-label {
      font-size: 0.75rem; font-weight: 600;
      color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase;
    }
    .header-label span { color: var(--coral); }

    .header-right { display: flex; align-items: center; gap: 0.5rem; }

    .live-badge {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.72rem; font-weight: 600;
      color: var(--teal); letter-spacing: 0.08em; text-transform: uppercase;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--teal);
      animation: pulse 2.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.4; transform:scale(0.8); }
    }

    /* ── EMBED CONTAINER ── */
    .embed-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .embed-container iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ── FOOTER ── */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 2.5rem;
      border-top: 1px solid var(--panel-border);
      background: rgba(2,28,48,0.90);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      flex-shrink: 0;
    }

    .footer-left {
      display: flex; align-items: center; gap: 1.5rem;
    }

    .chapter-links {
      display: flex; align-items: center; gap: 1.25rem;
    }
    .chapter-link {
      font-size: 0.70rem; font-weight: 600;
      color: var(--text-muted); letter-spacing: 0.04em;
      text-decoration: none; text-transform: uppercase;
      transition: color 0.15s;
    }
    .chapter-link:hover { color: var(--white); }
    .chapter-link.active { color: var(--coral); }

    .footer-right {
      font-size: 0.70rem; color: var(--text-muted); font-weight: 500;
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div class="header-left">
      <div class="boomi-wordmark">boomi<span class="dot">.</span></div>
      <div class="header-divider"></div>
      <div class="header-label">DataHub <span>Interactive Demo</span></div>
    </div>
    <div class="header-right">
      <div class="live-badge">
        <div class="live-dot"></div>
        Live Demo Environment
      </div>
    </div>
  </header>

  <div class="embed-container">
    <iframe
      data-navattic-src="https://capture.navattic.com/cmpx1t4lu002o04l8d6w8auvt"
      data-navattic-placeholder-src="https://app.navattic.com/api/poster/cmpx1t4lu002o04l8d6w8auvt"
      data-navattic-button-text="Try a demo"
      style="border:none;width:100%;height:100%;position:relative;"
      data-navattic-demo-id="cmpx1t4lu002o04l8d6w8auvt"
      allow="fullscreen">
    </iframe>
  </div>

  <footer>
    <div class="footer-left">
      <div class="chapter-links">
        <a href="01-intro.html" class="chapter-link">01 Intro</a>
        <a href="02-pain.html" class="chapter-link">02 The Problem</a>
        <a href="03-chaos.html" class="chapter-link">03 The Scale</a>
        <a href="04-pivot.html" class="chapter-link">04 The Solution</a>
        <a href="05-close.html" class="chapter-link">05 The Result</a>
      </div>
    </div>
    <div class="footer-right">Boomi DataHub · Unified Data Governance</div>
  </footer>

</div>

<script>
  var d=document,
      w="https://js.navattic.com/embeds.js",
      v=function(){
        "undefined"!=typeof NavatticEmbed
          ? NavatticEmbed.loadEmbeds()
          : d.querySelectorAll("iframe[data-navattic-src]:not([src])").forEach(function(e){
              e.src=e.dataset.navatticSrc
            })
      };
  if("undefined"!=typeof NavatticEmbed) v();
  else if(d.querySelector('script[src="'+w+'"]')==null){
    var s=d.createElement("script");
    s.src=w; s.onload=v; s.onerror=v; d.body.appendChild(s);
  }
</script>

</body>
</html>
